name: AutiScreen CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Execute Automated Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Run Test Runner
      run: |
        docker compose -f tests/docker-compose.test.yml up --build --exit-code-from test-runner

    - name: Teardown Services
      if: always()
      run: |
        docker compose -f tests/docker-compose.test.yml down -v
