server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml
        font/woff2;
    gzip_min_length 1024;

    # ── Static assets — long-term cache (CRA uses content-hashed filenames) ─
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA routing — hand all paths to React Router ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Never cache index.html — browser must always get fresh JS hashes
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API Proxy — forward /api to the backend container ────────────────────
    location /api/ {
        # Strip the /api prefix before forwarding to backend
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security & CORS (if needed)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Docker healthcheck endpoint ──────────────────────────────────────────
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}
