name: Build Flutter APK
on:
  push:
    branches: [ main, master, ayush ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android Platform 36 + Build Tools
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"
      - name: Accept Android licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55" \
            > "$ANDROID_HOME/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" \
            > "$ANDROID_HOME/licenses/android-googletv-license"
          printf "d56f5187479451eabf01fb78af6dfcb131a6481e\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > "$ANDROID_HOME/licenses/android-sdk-preview-license"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Download MediaPipe Model
        run: |
          mkdir -p android/app/src/main/assets
          curl -L -o android/app/src/main/assets/face_landmarker.task "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
          mkdir -p assets
          curl -L -o assets/face_landmarker.task "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
      - name: Set up Flutter 3.32.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos || true
      - name: Build release APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autiscreen-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
