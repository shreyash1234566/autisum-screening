version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       autism_db
      POSTGRES_USER:     autism_user
      POSTGRES_PASSWORD: autism_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autism_user -d autism_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      # Use multi-stage build or cache optimization if Dockerfile allows
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:      postgresql://autism_user:autism_pass@db:5432/autism_db
      VIDEO_STORAGE_PATH: /data/videos
      OPENFACE_BIN:      /usr/local/bin/FeatureExtraction
      ASDMOTION_PATH:    /opt/ASDMotion
    volumes:
      - videodata:/data/videos
      - ./backend:/app
      # MOUNT REAL ASDMOTION HERE:
      - /opt/ASDMotion:/opt/ASDMotion:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  videodata:
